<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      background: #000;
    }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: white; font-family: sans-serif; font-size: 12px; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px; z-index: 1000;
      pointer-events: none;
    }
    .cesium-viewer-bottom, .cesium-viewer-toolbar { display: none !important; }
  </style>
</head>
<body>
  <div id="loading">Carregando Ambiente 3D...</div>
  <div id="cesiumContainer"></div>
  <script>
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhODVhODA0Mi01MTM1LTQzZjMtOTYwYi03YzZjYTRkYjUwOTUiLCJpZCI6NDA1ODM5LCJpYXQiOjE3NzM4NzQyMjl9.wXfnlGmc-_v6whCgmUu-KKaFoiXwoLXIcdBum77FFDQ";

    const urlParams = new URLSearchParams(window.location.search);
    const lat = parseFloat(urlParams.get('lat'));
    const lon = parseFloat(urlParams.get('lon'));

    async function init() {
      const viewer = new Cesium.Viewer("cesiumContainer", {
        globe: false,
        skyAtmosphere: new Cesium.SkyAtmosphere(),
        baseLayerPicker: false, geocoder: false, homeButton: false, infoBox: false,
        selectionIndicator: false, navigationHelpButton: false, animation: false,
        timeline: false, fullscreenButton: false,
        msaaSamples: 4
      });

      try {
        const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(2275207, {
          maximumScreenSpaceError: 16,
          preferLeaves: true
        });
        viewer.scene.primitives.add(tileset);
        
        tileset.initialTilesLoaded.addEventListener(() => {
          document.getElementById('loading').style.display = 'none';
        });

        if (!isNaN(lat) && !isNaN(lon)) {
          const position = Cesium.Cartesian3.fromDegrees(lon, lat, 250);
          viewer.camera.flyTo({
            destination: position,
            orientation: {
              heading: Cesium.Math.toRadians(0),
              pitch: Cesium.Math.toRadians(-35),
              roll: 0.0
            },
            duration: 1.5
          });

          viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat),
            point: {
              pixelSize: 14,
              color: Cesium.Color.RED,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 3,
              heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND
            },
            label: {
              text: 'LOCALIZADO',
              font: 'bold 10pt sans-serif',
              fillColor: Cesium.Color.WHITE,
              outlineColor: Cesium.Color.BLACK,
              outlineWidth: 2,
              style: Cesium.LabelStyle.FILL_AND_OUTLINE,
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              pixelOffset: new Cesium.Cartesian2(0, -15),
              heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
              disableDepthTestDistance: 1000
            }
          });
        }
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerText = "Erro ao carregar mapa";
      }
    }
    init();
  </script>
</body>
</html>
